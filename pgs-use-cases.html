<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGS Use Cases Framework – Interactive Tool</title>
<style>
:root {
  --who-blue: #00709B;
  --who-dark: #004A6E;
  --who-light: #E8F4F9;
  --cell-h: #1A5276;
  --cell-m: #5B9DC3;
  --cell-l: #BDD9ED;
  --cell-na: #F0F0F0;
  --sidebar-w: 440px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #222; background: #f5f7f9; }

header { background: var(--who-dark); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 16px; }
.logo { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }

.toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: #fff; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
.toolbar label { font-size: 12px; color: #555; font-weight: 600; }
.toolbar select { font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; }
.legend { display: flex; gap: 14px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #444; }
.swatch { width: 14px; height: 14px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); }

.layout { display: flex; height: calc(100vh - 101px); }
.table-wrap { flex: 1; overflow: auto; padding: 12px 16px; }

/* sticky headers */
.sticky-header { position: sticky; top: 0; z-index: 20; background: #f5f7f9; }

table { border-collapse: separate; border-spacing: 2px; }
.corner-th { min-width: 196px; background: #f5f7f9; }
.cat-th { background: var(--who-blue); color: #fff; font-size: 10px; font-weight: 700; text-align: center; padding: 4px 2px; letter-spacing: 0.3px; }
.cat-ph { background: #1260A8; }
.cat-sp { background: #1672B4; }
.cat-cl { background: #1A82C0; }
.uc-th { background: var(--who-light); color: var(--who-dark); font-size: 11px; font-weight: 700; text-align: center; padding: 6px 2px; width: 54px; min-width: 54px; cursor: pointer; vertical-align: bottom; }
.uc-th:hover { background: #c5e0ee; }
.uc-th.active { background: #a8d0e6; outline: 2px solid var(--who-blue); }
.uc-abbrev { display: block; font-size: 9px; font-weight: 400; opacity: 0.75; white-space: normal; line-height: 1.2; margin-top: 3px; }

.group-row td { background: var(--who-dark); color: #fff; font-weight: 700; font-size: 11px; padding: 5px 10px; letter-spacing: 0.4px; text-transform: uppercase; }
.pathogen-td { background: #fff; font-size: 12px; padding: 5px 10px; min-width: 196px; max-width: 196px; white-space: normal; line-height: 1.3; border: 1px solid #e5e5e5; vertical-align: middle; }

.cell { width: 54px; min-width: 54px; height: 34px; text-align: center; vertical-align: middle; cursor: pointer; border-radius: 3px; transition: filter 0.1s; border: 2px solid transparent; }
.cell:hover { filter: brightness(0.85); }
.cell.H { background: var(--cell-h); }
.cell.M { background: var(--cell-m); }
.cell.L { background: var(--cell-l); }
.cell.NA { background: var(--cell-na); cursor: default; }
.cell.NA:hover { filter: none; }
.cell.active { border-color: #E67E22; filter: brightness(0.9); }

/* Sidebar */
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: #fff; border-left: 2px solid #ddd; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar.hidden { display: none; }
.sb-head { background: var(--who-dark); color: #fff; padding: 14px 16px; display: flex; align-items: flex-start; gap: 8px; }
.sb-title { flex: 1; }
.sb-pathogen { font-size: 15px; font-weight: 700; line-height: 1.2; }
.sb-uc { font-size: 11px; opacity: 0.85; margin-top: 3px; }
.sb-badge { display: inline-block; margin-top: 7px; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; }
.badge-H { background: var(--cell-h); }
.badge-M { background: var(--cell-m); }
.badge-L { background: var(--cell-l); color: #333; }
.badge-NA { background: #999; }
.close-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; flex-shrink: 0; }
.close-btn:hover { color: #fff; }

.sb-body { padding: 14px 16px; }
.uc-desc { background: var(--who-light); border-left: 3px solid var(--who-blue); padding: 10px 12px; border-radius: 0 4px 4px 0; font-size: 12px; line-height: 1.5; color: #333; margin-bottom: 12px; }
.level-def { font-size: 12px; color: #555; line-height: 1.45; margin-bottom: 14px; }
.studies-hd { font-weight: 700; font-size: 12px; color: var(--who-dark); margin-bottom: 8px; border-bottom: 2px solid var(--who-light); padding-bottom: 5px; }
.no-studies { color: #888; font-size: 12px; font-style: italic; padding: 10px 0; }

.study { border: 1px solid #e0e0e0; border-radius: 6px; padding: 11px; margin-bottom: 9px; background: #fff; }
.study-title { font-weight: 600; font-size: 12px; color: #1A3E5C; line-height: 1.4; margin-bottom: 6px; }
.study-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
.tag { background: var(--who-light); color: var(--who-dark); font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag.obj { background: #E8F5E9; color: #2E7D32; }
.study-abs { font-size: 11px; color: #555; line-height: 1.5; max-height: 90px; overflow: hidden; }
.study-abs.open { max-height: none; }
.more-btn { font-size: 11px; color: var(--who-blue); background: none; border: none; cursor: pointer; padding: 3px 0; }
.more-btn:hover { text-decoration: underline; }

/* UC info bar */
.uc-info { background: var(--who-light); border: 1px solid #b3d4e8; border-radius: 5px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; line-height: 1.5; display: none; }
.uc-info.visible { display: block; }
.uc-info h3 { color: var(--who-dark); margin-bottom: 5px; font-size: 13px; }

.filtered-out { display: none !important; }
.dim { opacity: 0.2 !important; pointer-events: none; }

.tag.pubmed { background: #e8f4fd; color: #0077b6; border: 1px solid #b8d9f0; }
.tag.src-excel { background: #e8f5e9; color: #2e7d32; border: 1px solid #b2dfdb; }
.study a.pmid-link { font-size: 11px; color: #0077b6; text-decoration: none; margin-left: 4px; }
.study a.pmid-link:hover { text-decoration: underline; }
.pubmed-section { margin-top: 10px; }
.pubmed-hd { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  color: #0077b6; margin: 10px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #cce4f7; }
.pubmed-loading { font-size: 11px; color: #888; font-style: italic; padding: 4px 0; }
.pubmed-error { font-size: 11px; color: #c0392b; padding: 4px 0; }
.studies-hd-excel { font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .04em; color: #2e7d32; margin: 0 0 6px; padding-bottom: 4px;
  border-bottom: 1px solid #b2dfdb; }

</style>
</head>
<body>

<header>
  <div>
    <div class="logo">PGS Use Cases Framework</div>
    <div class="subtitle">Pathogen Genomic Surveillance — Levels of Utility for Public Health Decision-Making</div>
  </div>
</header>

<div class="toolbar">
  <label>Pathogen group:</label>
  <select id="groupFilter">
    <option value="all">All groups</option>
    <option value="pandemic">Pandemic potential</option>
    <option value="endemic">Endemic / epidemic</option>
    <option value="agnostic">Pathogen-agnostic</option>
  </select>
  <label style="margin-left:10px">Use case:</label>
  <select id="ucFilter"><option value="all">All use cases</option></select>
  <div class="legend">
    <div class="legend-item"><div class="swatch" style="background:var(--cell-h)"></div>High</div>
    <div class="legend-item"><div class="swatch" style="background:var(--cell-m)"></div>Medium</div>
    <div class="legend-item"><div class="swatch" style="background:var(--cell-l)"></div>Low</div>
    <div class="legend-item"><div class="swatch" style="background:var(--cell-na);border:1px solid #ccc"></div>N/A</div>
  </div>
</div>

<div class="layout">
  <div class="table-wrap">
    <div id="ucInfo" class="uc-info"></div>
    <table id="tbl"></table>
  </div>
  <div class="sidebar hidden" id="sidebar">
    <div class="sb-head">
      <div class="sb-title">
        <div class="sb-pathogen" id="sbPathogen"></div>
        <div class="sb-uc" id="sbUC"></div>
        <div id="sbBadge"></div>
      </div>
      <button class="close-btn" id="closeBtn">&#x00D7;</button>
    </div>
    <div class="sb-body" id="sbBody"></div>
  </div>
</div>

duals", "spec": "mpox", "objective_clean": "Outbreak investigation", "objective2": "", "period": "2022", "n_genomes": "102", "pathogen_clean": "mpox", "abstract_short": "The impact and frequency of infectious disease outbreaks demonstrate the need for timely genomic surveillance to inform public health responses. In the largest known outbreak of mpox, genomic surveillance efforts have primarily focused on high-incidence nations in Europe and the Americas, with a paucity of data from South-East Asia and the Western Pacific. Here we analyzed 102 monkeypox virus (MPXV) genomes sampled from 56 individuals in Melbourne, Australia. All genomes fell within the 2022 MPXV outbreak lineage (B.1), with likely onward local transmission detected. We observed within-host di…"}, {"nr": 10, "title": "Whole genome analysis and antimicrobial resistance of Neisseria gonorrhoeae isolates from Ghana", "country": "Ghana", "objective": "Surveillance of current AMR profile", "sample_size": "", "pathogen": "56 isolates", "spec": "Neisseria gonorrhoeae", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2012- 2019", "n_genomes": "56", "pathogen_clean": "Neisseria gonorrhoeae", "abstract_short": "Gonorrhoea is a major public health concern. With the global emergence and spread of resistance to last-line antibiotic treatment options, gonorrhoea threatens to be untreatable in the future. Therefore, this study performed whole genome characterization of Neisseria gonorrhoeae collected in Ghana to identify lineages of circulating strains as well as their phenotypic and genotypic antimicrobial resistance (AMR) profiles. METHODS: Whole genome sequencing (WGS) was performed on 56 isolates using both the Oxford Nanopore MinION and Illumina MiSeq sequencing platforms. The Comprehensive Antimicro…"}, {"nr": 11, "title": "Genomic surveillance of enterovirus associated with aseptic meningitis cases in southern Spain, 2015-2018", "country": "Spain", "objective": "Genetic case investigation", "sample_size": "Metagenomics (non-targeted NGS) use for Enterovirus characterization, and detection of a novel, disease-associated, recombinant form. Identify spread and evolution of Enteroviruses in meningitis cases", "pathogen": "mNGS on 12 CSF samples of laboratory-diagnosed enteroviral meningitis", "spec": "Enterovirus", "objective_clean": "Clinical management", "objective2": "Clinical Characterization and Severity Assessment", "period": "2015-2018", "n_genomes": "12", "pathogen_clean": "Enterovirus", "abstract_short": "New circulating Enterovirus (EV) strains often emerge through recombination. Upsurges of recombinant non-polio enteroviruses (NPEVs) associated with neurologic manifestations such as EVA71 or Echovirus 30 (E30) are a growing public health concern in Europe. Only a few complete genomes of EVs circulating in Spain are available in public databases, making it difficult to address the emergence of recombinant EVs, understand their evolutionary relatedness and the possible implication in human disease. We have used metagenomic (untargeted) NGS to generate full-length EV genomes from CSF samples of …"}, {"nr": 12, "title": "Yellow Fever Virus Reemergence and Spread in Southeast Brazil, 2016-2019", "country": "Brazil", "objective": "Investigate the genetic diversity and spatial distribution of YFV during the current outbreak", "sample_size": "Understand genetic diversity and dynamics and revealed the estimated timing, source, and likely routes of yellow fever virus transmission and dispersion during one of the largest outbreaks ever registered in Brazil. ", "pathogen": "18 complete and nearly complete genomes from the peak of the epidemic curve from nonhuman primates (NHPs) and human infected cases", "spec": "Yellow fever ", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2016-2019", "n_genomes": "18", "pathogen_clean": "Yellow fever ", "abstract_short": "The recent reemergence of yellow fever virus (YFV) in Brazil has raised serious concerns due to the rapid dissemination of the virus in the southeastern region. To better understand YFV genetic diversity and dynamics during the recent outbreak in southeastern Brazil, we generated 18 complete and nearly complete genomes from the peak of the epidemic curve from nonhuman primates (NHPs) and human infected cases across the EspÃ­rito Santo and Rio de Janeiro states. Genomic sequencing of 18 YFV genomes revealed the estimated timing, source, and likely routes of yellow fever virus transmission and d…"}, {"nr": 13, "title": "Field and classroom initiatives for portable sequence-based monitoring of dengue virus in Brazil", "country": "Brazil", "objective": "Retrospectively reconstructed the recent transmission history of DENV1-2 in classroom and field led initiative", "sample_size": "Reconstruct (and train on) recent dengue circulation and tranmission patterns", "pathogen": "227 genomes from 85 municipalities", "spec": "Dengue", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2015–2020", "n_genomes": "227", "pathogen_clean": "Dengue", "abstract_short": "Brazil experienced a large dengue virus (DENV) epidemic in 2019, highlighting a continuous struggle with effective control and public health preparedness. Using Oxford Nanopore sequencing, we led field and classroom initiatives for the monitoring of DENV in Brazil, generating 227 novel genome sequences of DENV1-2 from 85 municipalities (2015-2019). This equated to an over 50% increase in the number of DENV genomes from Brazil available in public databases. Using both phylogenetic and epidemiological models we retrospectively reconstructed the recent transmission history of DENV1-2. Phylogeneti…"}, {"nr": 14, "title": "Sustained Transmission of Neisseria gonorrhoeae Strains with High-Level Azithromycin Resistance (MIC â‰¥ 256 Î¼g/mL) in Argentina, 2018 to 2022", "country": "Argentina", "objective": "Real-time genetic surveillance and resistance profiling", "sample_size": " Develop targeted public health policies to control the spread of azithromycin-resistant N. gonorrhoeae in Argentina and internationally.", "pathogen": "2018 to 2022 collected 13 isolates", "spec": "Neisseria gonorrhoeae", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2018-2022", "n_genomes": "13", "pathogen_clean": "Neisseria gonorrhoeae", "abstract_short": "Azithromycin combined with ceftriaxone is the recommended dual therapy for uncomplicated gonorrhea in many countries. Nevertheless, the increasing prevalence of azithromycin resistance compromises the effectiveness of this treatment strategy. From 2018 to 2022, we collected 13 gonococcal isolates with high-level azithromycin resistance (MIC â‰¥ 256â€‰Î¼g/mL) across Argentina. Whole-genome sequencing revealed that these isolates were mainly represented by the internationally spreading Neisseria gonorrhoeae multi-antigen sequence typing (NG-MAST) genogroup G12302, containing the 23S rRNA A2059G …"}, {"nr": 15, "title": "Phylogenetic Analysis of Spread of Hepatitis C Virus Identified during HIV Outbreak Investigation, Unnao, India", "country": "India", "objective": "Phylogenetic analysis of spread during outbreak investigation", "sample_size": "Investigation of co-infection HUIV-HPC to identify source of infection, time of emergence and genotyping", "pathogen": "98 HCV seroreactive participants, including 70 with HCV and 28 with HIV–HCV co-infection", "spec": "Hepatitis C", "objective_clean": "Outbreak investigation", "objective2": "", "period": "2017–2018", "n_genomes": "98", "pathogen_clean": "Hepatitis C", "abstract_short": "An HIV outbreak investigation during 2017-2018 in Unnao District, Uttar Pradesh, India, unearthed high prevalence of hepatitis C virus (HCV) antibodies among the study participants. We investigated these HCV infections by analyzing NS5B and core regions. We observed no correlation between HIV-HCV viral loads and clustering of HCV sequences, regardless of HIV serostatus. All HCV isolates belonged to genotype 3a. Monophyletic clustering of isolates in NS5B phylogeny indicates emergence of the outbreak from a single isolate or its closely related descendants. The nucleotide substitution rate for …"}, {"nr": 16, "title": "Retrospective Spatio-Temporal Dynamics of Dengue Virus 1, 2 and 4 in Paraguay", "country": "Paraguay", "objective": "Retrospective Spatio-Temporal Dynamics ", "sample_size": "Genomic surveillance and monitoring of arbovirus transmission ", "pathogen": "99 serum samples from patients presenting with symptoms compatible with an arboviral infection. Samples were collected from 15 of Paraguay’s 17 departments between 2014 and 2022. Nanopore sequencing", "spec": "Dengue", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2014-2022", "n_genomes": "99", "pathogen_clean": "Dengue", "abstract_short": "Dengue virus (DENV) has been a major public health concern in Paraguay, with frequent outbreaks occurring since early 1988. Although control measures have been implemented, dengue remains a significant health threat in the country, and continued efforts are required for prevention and control. In response to that, in collaboration with the Central Public Health Laboratory in AsunciÃ³n, we conducted a portable whole-genome sequencing and phylodynamic analysis to investigate DENV viral strains circulating in Paraguay over the past epidemics. Our genomic surveillance activities revealed the co-ci…"}, {"nr": 17, "title": "Genetic Characterization and Enhanced Surveillance of Ceftriaxone-Resistant Neisseria gonorrhoeae Strain, Alberta, Canada, 2018", "country": "Canada", "objective": "Microbiological investigation of unusual cases at the local, provincial, and national levels using phenotypic antimicrobial susceptibility testing and nucleic acid–based antibiotic susceptibility determination, as well as genetic typing ", "sample_size": "Enhance detection, public health investigations, and surveillance to address treatment failures. ", "pathogen": "2 cases of treatment failures, and subsequent community testing to assess spread ", "spec": "Neisseria gonorrhoeae", "objective_clean": "Clinical management", "objective2": "", "period": "2018", "n_genomes": "2", "pathogen_clean": "Neisseria gonorrhoeae", "abstract_short": "In July 2018, a case of Neisseria gonorrhoeae associated with ceftriaxone treatment failure was identified in Alberta, Canada. We identified the isolate and nucleic acid amplification testing (NAAT) specimen as the ceftriaxone-resistant strain multilocus sequence type 1903/NG-MAST 3435/NG-STAR 233, originally identified in Japan (FC428), with the same penA 60.001 mosaic allele and genetic resistance determinants. Core single-nucleotide variant (SNV) analysis identified 13 SNVs between this isolate and FC428. Culture-independent surveillance by PCR for the A311V mutation in the penA allele and …"}, {"nr": 18, "title": "A Comprehensive Molecular and Epidemiological Characterization of Influenza Viruses Circulating 2016-2020 in North Macedonia", "country": "North Macedonia", "objective": "Phylogenetic and mutational profile surveillance, and comparison of sentinel and existing influenza surveillance system. Monitoring of circulating strains and their gradual evolution towrds new dominant strains.", "sample_size": "The aims of this study were to give a comprehensive virological and epidemiological overview of four influenza seasons (2016-2020), assess the frequency and distribution of influenza circulating in North Macedonia and to carry out molecular and phylogenetic analyses of the hemagglutinin (HA) and neuraminidase (NA) genes of influenza A(H1N1)pdm09, A(H3N2) from ILI and SARI patients", "pathogen": "1632 samples", "spec": "Seasonal influenza", "objective_clean": "Pathogen characterization", "objective2": "Pathogen genetic epidemiology & transmission patterns", "period": "2016-2020 ", "n_genomes": "1632", "pathogen_clean": "Seasonal influenza", "abstract_short": "Influenza viruses know no boundaries, representing an example of rapid virus evolution combined with pressure exerted by the host's immune system. Seasonal influenza causes 4-50 million symptomatic cases in the EU/EEA each year, with a global death toll reaching 650,000 deaths. That being the case, in 2014 North Macedonia introduced the sentinel surveillance in addition to the existing influenza surveillance in order to obtain more precise data on the burden of disease, circulating viruses and to implement timely preventive measures. The aims of this study were to give a comprehensive virologi…"}, {"nr": 19, "title": "Genetic Characterization of Novel Oral Polio Vaccine Type 2 Viruses During Initial Use Phase Under Emergency Use Listing - Worldwide, March-October 2021", "country": "Global", "objective": "Global characterization of vaccine-derived polioviruses", "sample_size": "Large-scale nOPV2 use in immunization campaigns and corresponding monitoring of genetic stability of isolates from the field presented unique opportunities to further augment understanding of the vaccine’s behavior and its potential public health impact.", "pathogen": "Approximately 111 million doses of nOPV2 were administered worldwide during the initial use phase (March–October 2021). During this period, 128 nOPV2 isolates were detected from stool specimens collected as part of routine AFP surveillance from six countries, and 123 nOPV2 isolates corresponding to 39 distinct environmental surveillance samples were detected from seven countries. Whole-genome sequences were generated for these 251 nOPV2 cell-culture isolates. Approximately 111 million doses of nOPV2 were administered worldwide during the initial use phase (March–October 2021). In addition to nOPV2 isolates, whole-genome sequences of 331 cVDPV2 isolates from outbreaks in countries geographically associated with nOPV2 use were determined. ", "spec": "Polio vaccine-derived", "objective_clean": "Diagnostics, Vaccines and Therapeutics: M&E", "objective2": "", "period": "2021", "n_genomes": "251", "pathogen_clean": "Polio vaccine-derived", "abstract_short": "The emergence and international spread of neurovirulent circulating vaccine-derived polioviruses (cVDPVs) across multiple countries in Africa and Asia in recent years pose a major challenge to the goal of eradicating all forms of polioviruses. Approximately 90% of all cVDPV outbreaks are caused by the type 2 strain of the Sabin vaccine, an oral live, attenuated vaccine"}, {"nr": 20, "title": "Genetic characterization of Salmonella Infantis from South Africa, 2004-2016", "country": "South Africa", "objective": "Genetic surveillance and characterization of AMR profiles", "sample_size": "Information on genetic phylogeny, recombination frequency, antimicrobial resistance (AMR) determinants, plasmid presence and overall gene content.", "pathogen": "387 S. Infantis isolates from South Africa (2004-2020) ", "spec": "Salmonella", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2004-2020", "n_genomes": "387", "pathogen_clean": "Salmonella", "abstract_short": "Salmonella Infantis is presenting an increasing risk to public health. Of particular concern are the reports of pESI, a multidrug resistance (MDR) encoding megaplasmid, in isolates from multiple countries, but little is known about its presence or diversity in South Africa. Whole genome sequences of 387 S. Infantis isolates from South Africa (2004-2020) were analysed for genetic phylogeny, recombination frequency, antimicrobial resistance (AMR) determinants, plasmid presence and overall gene content. The population structure of South African S. Infantis was substantially different to S. Infant…"}, {"nr": 21, "title": "Genetic surveillance in the Greater Mekong subregion and South Asia to support malaria control and elimination", "country": "Greater Mekong subregion and South Asia", "objective": "Monitoring spread of resistant malaria strains in an open-source way to facilitate data sharing", "sample_size": "Provide detailed knowledge about drug resistance at a local level, facilitate data sharing at a regional level, enabling cross-border resistance monitoring. The project provides an open data resource to benefit the entire malaria community. ", "pathogen": "9623 samples from clinical cases", "spec": "Malaria", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2019", "n_genomes": "9623", "pathogen_clean": "Malaria", "abstract_short": " National Malaria Control Programmes (NMCPs) currently make limited use of parasite genetic data. We have developed GenRe-Mekong, a platform for genetic surveillance of malaria in the Greater Mekong Subregion (GMS) that enables NMCPs to implement large-scale surveillance projects by integrating simple sample collection procedures in routine public health procedures. METHODS: Samples from symptomatic patients are processed by SpotMalaria, a high-throughput system that produces a comprehensive set of genotypes comprising several drug resistance markers, species markers and a genomic barcode. Gen…"}, {"nr": 22, "title": "The Distribution and Spread of Susceptible and Resistant Neisseria gonorrhoeae Across Demographic Groups in a Major Metropolitan Center", "country": "United States of America", "objective": "Genetic surveillance and characterization of AMR,", "sample_size": "Identify patterns of local transmission between demographic groups of N. gonorrhea resistant and susceptible strains", "pathogen": "897 gonococcal isolates , convenience sampling", "spec": "Neisseria gonorrhoeae", "objective_clean": "Pathogen characterization", "objective2": "Pathogen genetic epidemiology & transmission patterns", "period": "2012-2013", "n_genomes": "897 reus isolates, including 70 methicillin-resistant S. aureus (MRSA) and 131 methicillin-susceptible S. aureus (MSSA), were collected from 2015 to 2021 in a tertiary hospital in Tianjin. Whole-genome sequencing of S. aureus is…"}, {"nr": 24, "title": "Endemic chikungunya fever in Kenyan children: a prospective cohort study", "country": "Kenya", "objective": "Longitudinal-genetic surveillance", "sample_size": "Estimate the incidence of CHIKF in coastal Kenya and describe the associated viral phylogeny. ", "pathogen": "3500 children visiting two primary healthcare facilities in coastal Kenya over a 5-year period (2014-2018)", "spec": "Chikungunya", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2014-2018", "n_genomes": "3500", "pathogen_clean": "Chikungunya", "abstract_short": " Chikungunya fever (CHIKF) was first described in Tanzania in 1952. Several epidemics including East Africa have occurred, but there are no descriptions of longitudinal surveillance of endemic disease. Here, we estimate the incidence of CHIKF in coastal Kenya and describe the associated viral phylogeny. METHODS: We monitored acute febrile illnesses among 3500 children visiting two primary healthcare facilities in coastal Kenya over a 5-year period (2014-2018). Episodes were linked to a demographic surveillance system and blood samples obtained. Cross-sectional sampling in a community survey of…"}, {"nr": 25, "title": "MDR carbapenemase-producing Klebsiella pneumoniae of the hypervirulence-associated ST23 clone in Poland, 2009-19", "country": "Poland", "objective": "Retrospective (recovered) characterization of genetic diversity of resistance patterns", "sample_size": "Characterize carbapenemase-producing isolates of the Klebsiella pneumoniae hypervirulent (hvKp) clone ST23, incl to identify clonality, phylogeny, serotypes, virulomes, resistomes and plasmids of the isolates were analysed and compared with international ST23 strains", "patho                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ", "pathogen": "10 whole genome sequences from 8552 ZIKV and microcephaly suspected cases", "spec": "Zika", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "", "period": "2015-2017", "n_genomes": "10", "pathogen_clean": "Zika", "abstract_short": "Autochthonous Zika virus (ZIKV) transmission in Brazil was first identified in April 2015 in Brazil, with the first ZIKV-associated microcephaly cases detected in October 2015. Despite efforts on understanding ZIKV transmission in Brazil, little is known about the virus epidemiology and genetic diversity in Minas Gerais (MG), the second most populous state in the country. We report molecular and genomic findings from the main public health laboratory in MG. Until January 2020, 26,817 ZIKV suspected infections and 86 congenital syndrome cases were tic epidemiology & transmission patterns", "objective2": "", "period": "2013-2014", "n_genomes": "404", "pathogen_clean": "Mycobacterium tuberculosis", "abstract_short": "The evolution and emergence of drug-resistant tuberculosis (TB) has been studied extensively in some contexts, but the ecological drivers of these two processes remain poorly understood. This study sought to describe the joint evolutionary and epidemiological histories of a novel multidrug-resistant Mycobacterium tuberculosis strain recently identified in the capital city of the Republic of Moldova (MDR Ural/4.2), where genomic surveillance of drug-resistant M. tuberculosis has been limited thus far. Using whole genome sequence data and Bayesian phylogenomic methods, we reconstruct the stepwis…"}, {"nr": 29, "title": "Malaria outbreak in Laos driven by a selective sweep for Plasmodium falciparum kelch13 R539T mutants: a genetic epidemiology analysis", "country": "Lao People's Democratic Republic", "objective": "Routine surveillance combined with analysis if ancestry", "sample_size": "Investigate epidemiological changes underpinning the outbreak, estimate population diversity, and analyse population structure. Whole-genome sequencing data from additional historical samples were used to reconstruct the ancestry of outbreak strains using identity-by-descent analyses", "pathogen": "2078 P falciparum dried blood spot samples from symptomatic cases", "spec": "Malaria", "objective_clean": "Pathogen genetic epidemiology & transmission patterns", "objective2": "Outbreak investigation (detection or management)", "period": "2017 - 2021", "n_genomes": "2078", "pathogen_clean": "Malaria", "abstract_short": "Malaria outbreaks are important public health concerns that can cause resurgence in endemic regions approaching elimination. We investigated a Plasmodium falciparum outbreak in Attapeu Province, Laos, during the 2020-21 malaria season, using genomic epidemiology methods to elucidate parasite population dynam     gr.dataset.group = p.group;
    var td = document.createElement('td');
    td.colSpan = 12;
    td.textContent = GROUP_LABELS[p.group];
    gr.appendChild(td);
  }
  var tr = tbody.insertRow();
  tr.className = 'pathogen-row grp-' + p.group;
  tr.dataset.group = p.group;

  var nameTd = tr.insertCell();
  nameTd.className = 'pathogen-td';
  nameTd.textContent = p.name;

  p.levels.forEach(function(lv, li) {
    var td = tr.insertCell();
    td.className = 'cell ' + lv;
    td.dataset.uc = li + 1;
    if (lv !== 'NA') {
      td.onclick = (function(pi2, ucNum, cell) {
        return function() { openSidebar(pi2, ucNum, cell); };
      })(pi, li + 1, td);
    }
  });
});

// ── Sidebar
var activeCell = null;

// ── PubMed live-fetch cache (keyed by "pathogen|ucNum") ──────────────────
var pmCache = {};

function openSidebar(pi, ucNum, cell) {
  if (activeCell) activeCell.classList.remove('active');
  activeCell = cell;
  cell.classList.add('active');

  var p = MATRIX[pi];
  var uc = USE_CASES[ucNum - 1];
  var lv = p.levels[ucNum - 1];

  document.getElementById('sbPathogen').textContent = p.name;
  document.getElementById('sbUC').textContent = 'UC' + ucNum + ': ' + uc.name;
  document.getElementById('sbBadge').innerHTML = '<span class="sb-badge badge-' + lv + '">' + LEVEL_LABELS[lv] + '</span>';

  var matches = findStudies(p.name, ucNum);
  var html = '<div class="uc-desc">' + esc(uc.desc) + '</div>';
  html += '<div class="level-def"><strong>' + LEVEL_LABELS[lv] + ':</strong> ' + esc(LEVEL_DEFS[lv]) + '</div>';

  // ── Asia PGI literature review section ──────────────────────────────────
  if (matches.length > 0) {
    html += '<div class="studies-hd-excel">Asia PGI Literature Review (' + matches.length + ' ' + (matches.length === 1 ? 'study' : 'studies') + ')</div>';
    matches.forEach(function(s) { html += studyCard(s, false); });
  } else {
    html += '<div class="studies-hd-excel">Asia PGI Literature Review</div>';
    html += '<div class="no-studies">No directly matching studies in the Asia PGI literature review for this combination.</div>';
  }

  // ── PubMed live section (placeholder, filled asynchronously) ────────────
  html += '<div class="pubmed-section" id="pmSection">';
  html += '<div class="pubmed-hd">PubMed Live Search (2019–2025)</div>';
  html += '<div class="pubmed-loading" id="pmStatus">Searching PubMed…</div>';
  html += '<div id="pmResults"></div>';
  html += '</div>';

  document.getElementById('sbBody').innerHTML = html;
  document.getElementById('sidebar').classList.remove('hidden');

  document.querySelectorAll('.more-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var abs = this.previousElementSibling;
      var open = abs.classList.toggle('open');
      this.textContent = open ? 'Show less' : 'Show more';
    });
  });

  // ── Kick off PubMed fetch (async) ────────────────────────────────────────
  fetchPubMed(p.name, ucNum);
}

function fetchPubMed(pathogenName, ucNum) {
  var cacheKey = pathogenName + '|' + ucNum;
  if (pmCache[cacheKey] !== undefined) {
    renderPubMed(pmCache[cacheKey], pathogenName);
    return;
  }

  var terms = PATHOGEN_ALIASES[pathogenName] || [pathogenName.toLowerCase()];
  var termsQ = terms.map(function(t) { return '"' + t + '"[Title/Abstract]'; }).join(' OR ');
  var base = '("genomic surveillance"[Title/Abstract] OR "genomic epidemiology"[Title/Abstract] OR ' +
    '"whole genome sequencing"[Title/Abstract] OR "phylogenetic"[Title/Abstract] OR ' +
    '"next-generation sequencing"[Title/Abstract])';
  var query = base + ' AND (' + termsQ + ') AND "public health"[Title/Abstract]';

  var searchURL = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed' +
    '&term=' + encodeURIComponent(query) +
    '&retmax=15&retmode=json&datetype=pdat&mindate=2019/01/01&maxdate=2025/12/31';

  fetch(searchURL)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var pmids = (data.esearchresult && data.esearchresult.idlist) || [];
      if (!pmids.length) {
        pmCache[cacheKey] = [];
        renderPubMed([], pathogenName);
        return;
      }
      var summaryURL = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed' +
        '&id=' + pmids.join(',') + '&retmode=json';
      return fetch(summaryURL)
        .then(function(r2) { return r2.json(); })
        .then(function(sd) {
          var results = pmids.map(function(id) {
            var doc = sd.result && sd.result[id];
            if (!doc) return null;
            var authors = (doc.authors || []).slice(0,3).map(function(a) { return a.name; }).join(', ');
            if ((doc.authors || []).length > 3) authors += ' et al.';
            return {
              title: doc.title || '',
              authors: authors,
              year: (doc.pubdate || '').substring(0,4),
              journal: doc.fulljournalname || doc.source || '',
              pmid: id,
              source: 'pubmed'
            };
          }).filter(Boolean);
          pmCache[cacheKey] = results;
          renderPubMed(results, pathogenName);
        });
    })
    .catch(function(err) {
      var st = document.getElementById('pmStatus');
      if (st) st.className = 'pubmed-error';
      if (st) st.textContent = 'PubMed unavailable (check network connection).';
    });
}

function renderPubMed(results, pathogenName) {
  var stEl = document.getElementById('pmStatus');
  var resEl = document.getElementById('pmResults');
  if (!stEl || !resEl) return;  // user already clicked away
  stEl.style.display = 'none';
  if (!results.length) {
    resEl.innerHTML = '<div class="no-studies">No PubMed results found for this pathogen/period.</div>';
    return;
  }
  var html = '';
  results.forEach(function(s) { html += studyCard(s, true); });
  resEl.innerHTML = html;
  resEl.querySelectorAll('.more-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var abs = this.previousElementSibling;
      var open = abs.classList.toggle('open');
      this.textContent = open ? 'Show less' : 'Show more';
    });
  });
}

document.getElementById('closeBtn').onclick = function() {
  document.getElementById('sidebar').classList.add('hidden');
  if (activeCell) { activeCell.classList.remove('active'); activeCell = null; }
};

function studyCard(s, isPubMed) {
  var html = '<div class="study">';
  if (isPubMed && s.pmid) {
    html += '<div class="study-title"><a href="https://pubmed.ncbi.nlm.nih.gov/' + esc(s.pmid) + '/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">' + esc(s.title) + '</a></div>';
  } else {
    html += '<div class="study-title">' + esc(s.title) + '</div>';
  }
  html += '<div class="study-tags">';
  if (isPubMed) {
    if (s.authors) html += '<span class="tag">' + esc(s.authors) + '</span>';
    if (s.year) html += '<span class="tag">' + esc(s.year) + '</span>';
    if (s.journal) html += '<span class="tag obj">' + esc(s.journal.substring(0,50)) + '</span>';
    if (s.pmid) html += '<span class="tag pubmed">PMID:' + esc(s.pmid) + '</span>';
  } else {
    if (s.country) html += '<span class="tag">' + esc(s.country) + '</span>';
    if (s.period) html += '<span class="tag">' + esc(String(s.period)) + '</span>';
    if (s.n_genomes) html += '<span class="tag">n=' + esc(String(s.n_genomes)) + '</span>';
    if (s.objective_clean) html += '<span class="tag obj">' + esc(s.objective_clean.substring(0,55)) + '</span>';
  }
  html += '</div>';
  if (!isPubMed && s.abstract_short) {
    html += '<div class="study-abs">' + esc(s.abstract_short) + '</div>';
    html += '<button class="more-btn">Show more</button>';
  }
  html += '</div>';
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Study matching
function findStudies(pathogenName, ucNum) {
  var aliases = PATHOGEN_ALIASES[pathogenName] || [pathogenName.toLowerCase()];
  var ucKw = UC_KEYWORDS[String(ucNum)] || [];
  return STUDIES.filter(function(s) {
    var fields = [s.pathogen||'', s.pathogen_clean||'', s.spec||''].join(' ').toLowerCase();
    var objF = [s.objective||'', s.objective_clean||'', s.objective2||''].join(' ').toLowerCase();
    var pathMatch = aliases.some(function(a) { return fields.indexOf(a.toLowerCase()) >= 0; });
    if (!pathMatch) return false;
    if (!ucKw.length) return true;
    return ucKw.some(function(kw) { return objF.indexOf(kw.toLowerCase()) >= 0; });
  });
}

// ── UC info bar
var activeUCNum = null;
function showUCInfo(uc, th) {
  var panel = document.getElementById('ucInfo');
  document.querySelectorAll('.uc-th').forEach(function(t) { t.classList.remove('active'); });
  if (activeUCNum === uc.num && panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    activeUCNum = null;
    return;
  }
  activeUCNum = uc.num;
  th.classList.add('active');
  panel.innerHTML = '<h3>UC' + uc.num + ': ' + esc(uc.name) + ' <span style="font-weight:400;font-size:11px;color:#888">(' + esc(uc.group) + ')</span></h3>' + esc(uc.desc);
  panel.classList.add('visible');
}

// ── Filters
document.getElementById('groupFilter').addEventListener('change', applyFilters);
document.getElementById('ucFilter').addEventListener('change', applyFilters);

function applyFilters() {
  var gv = document.getElementById('groupFilter').value;
  var uv = document.getElementById('ucFilter').value;

  document.querySelectorAll('.pathogen-row, .group-row').forEach(function(row) {
    var g = row.dataset.group;
    if (gv === 'all' || g === gv) row.classList.remove('filtered-out');
    else row.classList.add('filtered-out');
  });

  document.querySelectorAll('.uc-th').forEach(function(th, i) {
    th.style.opacity = (uv === 'all' || String(i+1) === uv) ? '1' : '0.3';
  });
  document.querySelectorAll('.cell').forEach(function(cell) {
    var u = cell.dataset.uc;
    if (uv === 'all' || u === uv) cell.classList.remove('dim');
    else cell.classList.add('dim');
  });
}
</script>
